name: Update Weather Data

on:
  schedule:
    - cron: '0 */1 * * *'  # Run every hour
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      CI: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 0  # Needed for pull/rebase to work

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas

      - name: Set up Git identity
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Pull latest changes with rebase
        run: git pull --rebase origin main

      - name: Run weather data collection script
        run: |
          python src/texas-alerts.py --county-file src/texas-counties.csv --include-alerts --output-dir ./public

      - name: Commit and push if changed
        run: |
          git add public/texas_counties_weather.json public/texas_counties_weather.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update weather data [automated]" && git push origin main)

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install npm dependencies
        run: npm ci

      - name: Deploy to GitHub Pages
        run: npm run deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
