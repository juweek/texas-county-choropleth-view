name: Update Weather Data

on:
  schedule:
    # Run every hour
    - cron: '0 */1 * * *'
  # Optional: Allow manual triggering
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      CI: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas
      
      - name: Run weather data collection script
        run: |
          python src/texas-alerts.py --county-file src/texas-counties.csv --include-alerts --output-dir ./public
      
      - name: Commit and push if changed
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add public/texas_counties_weather.json public/texas_counties_weather.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update weather data [automated]" && git push) 